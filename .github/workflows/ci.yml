name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (fmt · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Rust workspace
        id: rust
        run: |
          if [ -f "rust/Cargo.toml" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No rust/Cargo.toml found — skipping Rust checks"
          fi

      - name: Install Rust toolchain
        if: steps.rust.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust artifacts
        if: steps.rust.outputs.present == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust"

      - name: cargo fmt --check
        if: steps.rust.outputs.present == 'true'
        run: cargo fmt --check
        working-directory: rust

      - name: cargo clippy
        if: steps.rust.outputs.present == 'true'
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: rust

      - name: cargo test
        if: steps.rust.outputs.present == 'true'
        run: cargo test --all-features
        working-directory: rust

  react-native:
    name: React Native (typecheck · lint · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect RN app
        id: rn
        run: |
          if [ -f "app/package.json" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No app/package.json found — skipping RN checks"
          fi

      - name: Setup Bun
        if: steps.rn.outputs.present == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.rn.outputs.present == 'true'
        run: bun install
        working-directory: app

      - name: TypeScript type check
        if: steps.rn.outputs.present == 'true'
        run: bun run typecheck
        working-directory: app

      - name: Lint
        if: steps.rn.outputs.present == 'true'
        run: bun run lint
        working-directory: app

      - name: Unit tests
        if: steps.rn.outputs.present == 'true'
        run: bun run test --passWithNoTests --ci
        working-directory: app
